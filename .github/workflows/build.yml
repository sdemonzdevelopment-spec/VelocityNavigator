name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.0.0)'
        required: true
        default: '4.1.0'
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityNavigator-${{ steps.version.outputs.version }}
          path: target/VelocityNavigator-*.jar

      - name: Extract Release Notes
        run: |
          awk '/^## \[/{if (p) exit; p=1; print; next} p' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: VelocityNavigator v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: target/VelocityNavigator-*.jar
          draft: false
          prerelease: false
